    {name:"火焰山",type:"景点",time:"16:30–18:00",lat:42.801,lng:89.533,desc:"西游记取景圣地，赤红山脉极具视觉冲击",photo:"傍晚斜阳染成深橙红，偏振镜加强饱和"},
    {name:"葡萄沟",type:"景点",time:"18:00–19:30",lat:42.958,lng:89.227,desc:"千年吐鲁番无核白葡萄产地，藤架遮天蔽日",photo:"仰拍葡萄藤架光影透射，人像逆光"},
    {name:"乌鲁木齐酒店",type:"住宿",time:"21:00",lat:43.827,lng:87.617,desc:"14天环线收官，好好休息",photo:""},
  ]},
];

const TYPE_COLOR = {景点:"#10b981",住宿:"#6366f1",加油:"#f59e0b",餐食:"#ef4444",其他:"#94a3b8"};
const TYPE_ICON  = {景点:"▲",住宿:"■",加油:"◆",餐食:"●",其他:"●"};

// Map init
const map = L.map('map', {
  center: [45.5, 84.5], zoom: 6,
  zoomControl: false,
  attributionControl: false,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19, subdomains: 'abcd'
}).addTo(map);

L.control.attribution({ position: 'bottomright' })
  .addAttribution('© <a href="https://carto.com">CARTO</a>')
  .addTo(map);

// State
let activeDay = 0; // 0 = all
const dayLayers = {};

function makeMarker(poi, day) {
  const color = TYPE_COLOR[poi.type] || '#94a3b8';
  const icon = L.divIcon({
    className: '',
    html: `<div style="
      width:28px;height:28px;border-radius:50%;
      background:${color};border:2.5px solid rgba(255,255,255,0.9);
      display:flex;align-items:center;justify-content:center;
      font-size:10px;color:#fff;font-weight:800;
      box-shadow:0 2px 8px rgba(0,0,0,0.5);
      cursor:pointer;
    ">${TYPE_ICON[poi.type]||'●'}</div>`,
    iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -16],
  });

  const photoHtml = poi.photo
    ? `<div class="popup-photo">📷 ${poi.photo}</div>` : '';

  const popup = L.popup({ maxWidth: 280, className: '' }).setContent(`
    <div class="popup-inner">
      <div class="popup-day-badge" style="background:${day.color}">${day.title} · ${day.route}</div>
      <div class="popup-type">${poi.type}</div>
      <div class="popup-name">${poi.name}</div>
      <div class="popup-time">🕐 ${poi.time}</div>
      <div class="popup-desc">${poi.desc}</div>
      ${photoHtml}
    </div>
  `);

  return L.marker([poi.lat, poi.lng], { icon }).bindPopup(popup);
}

function buildDayLayer(day) {
  const group = L.layerGroup();
  // Route polyline
  L.polyline(day.coords, {
    color: day.color, weight: 4, opacity: 0.85,
    lineJoin: 'round', lineCap: 'round',
  }).addTo(group);
  // POI markers
  day.pois.forEach(poi => makeMarker(poi, day).addTo(group));
  return group;
}

// Build all layers
DAYS.forEach(day => {
  dayLayers[day.id] = buildDayLayer(day);
  dayLayers[day.id].addTo(map);
});

// Day filter pills
const scroll = document.getElementById('day-scroll');

function setPill(id) {
  activeDay = id;
  document.querySelectorAll('.day-pill').forEach(p => {
    const active = parseInt(p.dataset.id) === id;
    p.classList.toggle('active', active);
    if (active) p.style.borderColor = p.dataset.color || 'rgba(255,255,255,0.8)';
    else p.style.borderColor = 'transparent';
  });

  DAYS.forEach(day => {
    const layer = dayLayers[day.id];
    if (id === 0 || day.id === id) {
      if (!map.hasLayer(layer)) layer.addTo(map);
    } else {
      if (map.hasLayer(layer)) map.removeLayer(layer);
    }
  });

  map.closePopup();

  if (id === 0) {
    map.setView([45.5, 84.5], 6);
    document.getElementById('subtitle-text').textContent = '乌鲁木齐出发 · 全程约4390公里 · 54个地点';
  } else {
    const day = DAYS.find(d => d.id === id);
    const bounds = L.latLngBounds(day.coords);
    map.fitBounds(bounds, { padding: [60, 60] });
    document.getElementById('subtitle-text').textContent = `${day.title} · ${day.route}`;
  }
}

// Build pills
const allPill = document.createElement('div');
allPill.className = 'day-pill active';
allPill.dataset.id = 0;
allPill.textContent = '全程';
allPill.style.borderColor = 'rgba(255,255,255,0.8)';
allPill.onclick = () => setPill(0);
scroll.appendChild(allPill);

DAYS.forEach(day => {
  const pill = document.createElement('div');
  pill.className = 'day-pill';
  pill.dataset.id = day.id;
  pill.dataset.color = day.color;
  pill.style.color = day.color;
  pill.textContent = `${day.title} ${day.route}`;
  pill.onclick = () => setPill(day.id);
  scroll.appendChild(pill);
});
</script>
</body>
</html>
